<!DOCTYPE html>
<html>
<head>
    <title>Certificate Eligibility</title>
    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Certificate Eligibility Checker</h1>

<table>

<tr>
<th>Name</th>
<th>Attendance</th>
<th>Rating</th>
<th>Status</th>
</tr>

{% for s in students %}

<tr>

<td>{{ s[1] }}</td>

<td>{{ s[4] }}</td>

<td>{{ s[6] }}</td>

<td>

{% if s[4] >= 75 and s[6] >= 3 %}
Eligible
{% else %}
Not Eligible
{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
