<!DOCTYPE html>
<html>
<head>
<title>Student Ranking</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🏆 Student Ranking</h1>

<table>

<tr>
<th>Name</th>
<th>Department</th>
<th>Attendance</th>
<th>Rating</th>
<th>Score</th>
</tr>

{% for s in students %}

<tr>

<td>{{ s[1] }}</td>
<td>{{ s[3] }}</td>
<td>{{ s[4] }}</td>
<td>{{ s[6] }}</td>

<td>
{{ s[4] + (s[6] * 10) }}
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
