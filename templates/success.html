<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <style>

    body{
        font-family:Arial,sans-serif;
        background:linear-gradient(
        135deg,
        #4facfe,
        #00f2fe
        );

        display:flex;
        justify-content:center;
        align-items:center;

        height:100vh;
    }

    .success-box{

        background:white;

        padding:50px;

        border-radius:20px;

        text-align:center;

        box-shadow:
        0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
        color:#28a745;
        font-size:40px;
    }

    p{
        font-size:20px;
        color:#555;
    }

    button{

        background:#0ea5e9;

        color:white;

        border:none;

        padding:12px 25px;

        border-radius:10px;

        font-size:18px;

        cursor:pointer;
    }

    button:hover{
        background:#0284c7;
    }

    </style>

</head>
<body>

<div class="success-box">

    <h1>✅ Success</h1>

    <p>{{ message }}</p>

    <br>

    <a href="/student_dashboard">
        <button>
            🏠 Back to Dashboard
        </button>
    </a>

</div>

</body>
</html>
