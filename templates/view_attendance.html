<!DOCTYPE html>
<html>
<head>
    <title>View Attendance</title>
    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>Student Attendance</h1>

<table border="1" width="100%">

<tr>
<th>Name</th>
<th>Attendance</th>
</tr>

{% for s in students %}

<tr>
<td>{{ s[1] }}</td>
<td>{{ s[4] }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
