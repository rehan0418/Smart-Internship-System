<!DOCTYPE html>
<html>
<head>
    <title>Student Report</title>
    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Student Report</h1>

<table>

<tr>
<th>Name</th>
<th>Department</th>
<th>Attendance</th>
<th>Tasks</th>
<th>Rating</th>
<th>Certificate Status</th>
</tr>

{% for s in students %}

<tr>

<td>{{ s[1] }}</td>
<td>{{ s[3] }}</td>
<td>{{ s[4] }}</td>
<td>{{ s[5] }}</td>
<td>{{ s[6] }}</td>

<td>

{% if s[4] >= 75 and s[6] >= 3 %}
Eligible
{% else %}
Not Eligible
{% endif %}

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
