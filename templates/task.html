<!DOCTYPE html>
<html>
<head>
<title>Submit Task</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Daily Task Submission</h1>

<form action="/save_task" method="POST">

<input type="text"
name="student_name"
placeholder="Student Name"
required>

<input type="text"
name="task_title"
placeholder="Task Title"
required>

<textarea
name="task_description"
rows="5"
style="width:100%;"
placeholder="Task Description">
</textarea>

<select name="status">

<option>Completed</option>
<option>Pending</option>

</select>

<br><br>

<button type="submit">
Submit Task
</button>

</form>

</div>

</body>
</html>
